name: Release Builds
on: push

permissions:
  contents: write

jobs:
  build-and-store-artifact:
    name: Build
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ ubuntu-latest, macos-latest, windows-latest ]
    steps:
    - uses: actions/checkout@v7
    - uses: ilammy/msvc-dev-cmd@v1
      if: matrix.os == 'windows-latest'
    - name: Make GNU
      if: matrix.os != 'windows-latest'
      working-directory: ./src
      run: make
      shell: bash
    - name: Make Windows
      if: matrix.os == 'windows-latest'
      working-directory: ./src
      run: nmake
    - name: Test
      shell: bash
      run: cd tests && ./test.sh
    - name: Package NIX
      if: matrix.os != 'windows-latest'
      run: zip --junk-paths ${{ format('b2d-{0}.zip', matrix.os) }} b2d README.md
    - name: Package WIN
      if: matrix.os == 'windows-latest'
      run: 7z.exe a ${{ format('b2d-{0}.zip', matrix.os) }} b2d.exe README.md
    - name: Upload binary artifact
      uses: actions/upload-artifact@v7
      with:
        name: ${{ format('b2d-{0}', matrix.os) }}
        path: ${{ format('b2d-{0}.zip', matrix.os) }}

  create-release:
    if: startsWith(github.ref, 'refs/tags/v')
    name: Create Release
    needs: build-and-store-artifact
    runs-on: ubuntu-latest
    steps:
    - name: Download binary artifacts
      uses: actions/download-artifact@v8
      with:
        pattern: b2d-*
        merge-multiple: true
    - name: Add tag to asset names
      run: |
        for f in b2d-*.zip; do
          mv "$f" "${f%.zip}-${{ github.ref_name }}.zip"
        done
    - name: Create Release and Upload Assets
      uses: softprops/action-gh-release@v3
      with:
        name: Release ${{ github.ref_name }}
        files: b2d-*.zip
